<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Little Pets - Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; background: #fefcf5; color: #1e2a1a; }
        .header { background: #0f3b2c; padding: 1rem 2rem; color: white; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; justify-content: space-between; }
        .logo-img { height: 48px; width: 48px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        .site-name { font-size: 1.4rem; font-weight: bold; }
        .back-home { color: white; text-decoration: none; background: #1a5a41; padding: 0.5rem 1rem; border-radius: 40px; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
        .article-wrapper { background: white; border-radius: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .post-header { padding: 2rem 2rem 0 2rem; }
        .post-title { font-size: 2rem; color: #0f3b2c; margin-bottom: 0.5rem; }
        .post-date { color: #6c7a5e; margin-bottom: 1rem; }
        .post-content { padding: 0 2rem 2rem 2rem; line-height: 1.7; }
        .post-content img { max-width: 100%; border-radius: 24px; margin: 1rem 0; }
        .post-content p { margin-bottom: 1rem; }
        
        /* Related posts styles */
        .related-section { background: white; border-radius: 32px; padding: 1.5rem; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .related-title { font-size: 1.6rem; color: #0f3b2c; margin-bottom: 1.2rem; border-left: 5px solid #1a5a41; padding-left: 1rem; }
        .related-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5rem; }
        .related-card { background: #f9fbf8; border-radius: 20px; overflow: hidden; transition: transform 0.2s; border: 1px solid #e0e8de; }
        .related-card:hover { transform: translateY(-4px); }
        .related-img { width: 100%; height: 140px; object-fit: cover; background: #d4e0d0; }
        .related-info { padding: 1rem; }
        .related-card-title { font-size: 1rem; font-weight: 600; color: #0f3b2c; margin-bottom: 0.3rem; }
        .related-card-date { font-size: 0.7rem; color: #7c8a72; }
        .related-link { text-decoration: none; color: inherit; display: block; }
        
        .footer { background: #0f3b2c; color: #ddd; text-align: center; padding: 1.5rem; margin-top: 2rem; }
        @media (max-width: 640px) { .post-title { font-size: 1.6rem; } .container { margin: 1rem; } }
    </style>
</head>
<body>
<header class="header">
    <div style="display: flex; align-items: center; gap: 12px;">
        <img src="logo.png" class="logo-img" onerror="this.src='https://placehold.co/100x100/0f3b2c/white?text=WLP';">
        <span class="site-name">Wild Little Pets</span>
    </div>
    <a href="index.html" class="back-home"><i class="fas fa-home"></i> Back to Home</a>
</header>
<main class="container">
    <div class="article-wrapper" id="postContent"></div>
    <div id="relatedPostsContainer"></div>
</main>
<footer class="footer">
    <p>© 2025 Wild Little Pets — Expert exotic pet guides</p>
</footer>
<script>
    // ========== COPY YOUR FULL postsData HERE (same as index.html) ==========
    const postsData = [
        {
            id: 1,
            title: "Bearded Dragon Care Guide for Beginners: Everything You Need to Know in 2026",
            date: "2026-01-15",
            content: `<img src="https://ca-times.brightspotcdn.com/dims4/default/fc45ccc/2147483647/strip/true/crop/1366x911+0+0/resize/1200x800!/quality/75/?url=https%3A%2F%2Fcalifornia-times-brightspot.s3.amazonaws.com%2Fd8%2Fd8%2F9a56642b4a09a3b7784152b4595e%2Fbearded-dragon-happy-cage.jpg" alt="Bearded dragon basking">
<p>So you just got a bearded dragon — or you're thinking about getting one. Either way, you're in the right place.</p>
<p>Bearded dragons are one of the most popular exotic pets for a reason... (rest of your content)</p>`
        }
        // Add your future posts HERE (id 2, 3, ...)
    ];
    // =========================================================================

    // Helper functions
    function getFirstImageSrc(html) { let div=document.createElement('div'); div.innerHTML=html; let img=div.querySelector('img'); return img ? img.src : null; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString(undefined, {year:'numeric',month:'long',day:'numeric'}); }
    
    // Get current post from URL
    function getPostBySlug(slug) {
        return postsData.find(post => {
            let postSlug = post.title.toLowerCase().replace(/[^\w\s]/g,'').replace(/\s+/g,'-');
            return postSlug === slug;
        });
    }
    
    // Find related posts: match words from current post title, exclude current, max 3
    function getRelatedPosts(currentPost, max=3) {
        if (!currentPost) return [];
        // Extract keywords from title (words longer than 3 chars, lowercase)
        let keywords = currentPost.title.toLowerCase().split(/\W+/).filter(w => w.length > 3);
        if (keywords.length === 0) keywords = ['dragon','gecko','lizard']; // fallback
        
        let scored = postsData.filter(p => p.id !== currentPost.id).map(post => {
            let titleLow = post.title.toLowerCase();
            let score = keywords.filter(kw => titleLow.includes(kw)).length;
            return { post, score };
        });
        scored.sort((a,b) => b.score - a.score);
        let filtered = scored.filter(item => item.score > 0).slice(0, max);
        // If not enough related by keyword, fill with latest posts
        if (filtered.length < max) {
            let existingIds = filtered.map(f => f.post.id);
            let latest = [...postsData].sort((a,b) => new Date(b.date) - new Date(a.date))
                         .filter(p => p.id !== currentPost.id && !existingIds.includes(p.id))
                         .slice(0, max - filtered.length);
            latest.forEach(p => filtered.push({ post: p, score: 0 }));
        }
        return filtered.map(f => f.post);
    }
    
    // Render related posts
    function renderRelatedPosts(relatedPosts, currentId) {
        const container = document.getElementById('relatedPostsContainer');
        if (!relatedPosts.length) { container.innerHTML = ''; return; }
        let html = `<div class="related-section"><h3 class="related-title"><i class="fas fa-paw"></i> You May Also Like</h3><div class="related-grid">`;
        for (let post of relatedPosts) {
            let thumb = getFirstImageSrc(post.content) || 'https://placehold.co/400x200/0f3b2c/white?text=Wild+Pets';
            let slug = encodeURIComponent(post.title.toLowerCase().replace(/[^\w\s]/g,'').replace(/\s+/g,'-'));
            html += `
                <a href="post.html?post=${slug}" class="related-link">
                    <div class="related-card">
                        <img class="related-img" src="${thumb}" alt="${escapeHtml(post.title)}">
                        <div class="related-info">
                            <div class="related-card-title">${escapeHtml(post.title)}</div>
                            <div class="related-card-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</div>
                        </div>
                    </div>
                </a>
            `;
        }
        html += `</div></div>`;
        container.innerHTML = html;
    }
    
    // Main display
    const urlParams = new URLSearchParams(window.location.search);
    const slugParam = urlParams.get('post');
    const post = getPostBySlug(slugParam);
    const postContainer = document.getElementById('postContent');
    const relatedContainer = document.getElementById('relatedPostsContainer');
    
    if(post) {
        postContainer.innerHTML = `
            <div class="post-header">
                <h1 class="post-title">${escapeHtml(post.title)}</h1>
                <div class="post-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</div>
            </div>
            <div class="post-content">${post.content}</div>
        `;
        document.title = `${post.title} | Wild Little Pets`;
        // Add schema
        let schema = { "@context": "https://schema.org", "@type": "BlogPosting", "headline": post.title, "datePublished": post.date, "author": { "@type": "Organization", "name": "Wild Little Pets" } };
        let script = document.createElement('script'); script.type = 'application/ld+json'; script.textContent = JSON.stringify(schema); document.head.appendChild(script);
        
        // Render related posts
        const related = getRelatedPosts(post, 3);
        renderRelatedPosts(related, post.id);
    } else {
        postContainer.innerHTML = `<div style="text-align:center; padding:3rem;"><i class="fas fa-exclamation-triangle"></i> Article not found. <a href="index.html">Return to homepage</a></div>`;
        relatedContainer.innerHTML = '';
    }
</script>
</body>
</html>
