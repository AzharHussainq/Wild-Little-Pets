<p>So you just got a bearded dragon — or you're thinking about getting one. Either way, you're in the right place.</p>
<p>Bearded dragons are one of the most popular exotic pets for a reason. They're friendly, curious, and surprisingly easy to care for once you understand what they need. But get a few things wrong early on and it can seriously affect their health.</p>
<p>This guide covers everything a beginner needs to know — from setting up the perfect enclosure to feeding, lighting, and the exact products that make life easier for both you and your beardie.</p>
<h3>What Do Bearded Dragons Need to Survive?</h3>
<p>Before anything else, here's a quick overview of what every bearded dragon needs daily:</p>
<ul><li>Heat — a proper basking spot and temperature gradient</li><li>UVB lighting — absolutely non-negotiable for their health</li><li>Proper food — a mix of live insects and fresh vegetables</li><li>A large enough enclosure — at minimum 120 x 60 x 60 cm for adults</li><li>Calcium & vitamin supplements — dusted on food regularly</li></ul>
<p>Miss any of these and your dragon will struggle. Let's break each one down.</p>
<h3>1. Setting Up the Perfect Bearded Dragon Enclosure</h3>
<p><strong>What Size Tank Does a Bearded Dragon Need?</strong><br>For a baby bearded dragon (0–3 months), a 40-gallon tank works fine. But adults need at least a 120-gallon enclosure — they grow fast, so many owners skip straight to the adult size.</p>
<p>💡 Pro Tip: Glass terrariums are the most popular choice because they hold heat well and are easy to clean. Look for ones with front-opening doors — they make feeding and cleaning so much easier.</p>

<p><strong>Enclosure Temperature Setup</strong><br>Bearded dragons are cold-blooded, meaning they rely on external heat to regulate their body temperature. You need two temperature zones inside the enclosure:</p>
<table border="1" cellpadding="5" style="border-collapse: collapse; width: 100%;"><tr><th>Zone</th><th>Temperature</th></tr><tr><td>Basking spot</td><td>100–110°F (38–43°C)</td></tr>
<tr><td>Cool side</td><td>80–85°F (27–29°C)</td></tr>
<tr><td>Nighttime</td><td>No lower than 65°F (18°C)</td></tr>
</table>
<p>Use a digital thermometer with dual probes to monitor both sides accurately.</p>
<p>👉 [Best reptile thermometers for bearded dragons →] (https://amzn.to/example2)</p>
<h3>2. UVB Lighting — The Most Important Thing You'll Buy</h3>
<p>This is where most beginners make mistakes. Bearded dragons must have UVB lighting — without it, they cannot absorb calcium properly, which leads to Metabolic Bone Disease (MBD). This is painful and often fatal.</p>
<p><strong>What UVB Bulb Should You Get?</strong><br>For bearded dragons, you need a T5 HO UVB bulb rated at 10.0 or 12%. The most trusted brands are:</p>
<ul><li>Arcadia Dragon Lamp 12% — considered the gold standard</li><li>Reptisun 10.0 T5 HO — widely available and reliable</li></ul>
<p>The UVB bulb should cover 2/3 of the enclosure length and be placed inside the tank, not on top of a mesh lid (mesh blocks up to 50% of UVB rays).</p>
<p>⚠️ Important: UVB bulbs lose effectiveness before they burn out. Replace every 6 months even if the light still works.</p>
<p>👉 [Shop Arcadia & Reptisun UVB bulbs →] (https://amzn.to/example3)</p>
<h3>3. What Do Bearded Dragons Eat?</h3>
<p>Bearded dragons are omnivores — they eat both insects and vegetables. The ratio changes as they age:</p>
<table border="1" cellpadding="5"><tr><th>Age</th><th>Insects</th><th>Vegetables</th></tr>
<tr><td>Baby (0–6 months)</td><td>80%</td><td>20%</td></tr>
<tr><td>Juvenile (6–12 months)</td><td>60%</td><td>40%</td></tr>
<tr><td>Adult (12+ months)</td><td>30%</td><td>70%</td></tr>
</table>
<p><strong>Best Insects for Bearded Dragons</strong></p>
<ul><li>Dubia roaches — the #1 feeder insect, high protein, low fat</li><li>Black soldier fly larvae (BSFL) — excellent calcium source</li><li>Crickets — widely available but gutload them first</li></ul>
<p>💡 Always gutload your feeders (feed them nutritious food) 24 hours before offering to your dragon.</p>
<p>👉 [Buy live Dubia roaches — best prices →] (https://amzn.to/example4)</p>
<p><strong>Best Vegetables for Bearded Dragons</strong><br>Safe daily greens include: collard greens, mustard greens, dandelion greens, butternut squash. Avoid spinach, iceberg lettuce, and avocado — these are harmful.</p>
<p><strong>Calcium & Vitamin Supplements</strong><br>Dust all feeder insects with calcium powder (without D3) at every feeding, and use a multivitamin twice a week.</p>
<p>👉 [Best calcium supplements for bearded dragons →] (https://amzn.to/example5)</p>
<h3>4. Substrate — What to Put on the Enclosure Floor</h3>
<p>For baby and juvenile bearded dragons, avoid loose substrate entirely — they can accidentally eat it and get impacted. Use reptile carpet or ceramic tiles.</p>
<p>👉 [Best reptile carpet for bearded dragons →] (https://amzn.to/example6)</p>
<h3>5. Handling & Taming Your Bearded Dragon</h3>
<p>One of the best things about bearded dragons is that they genuinely enjoy human interaction — once they're comfortable with you.</p>
<ul><li>Week 1: Don't handle at all. Let them settle into their new home.</li><li>Week 2: Start with short 5-minute sessions once a day.</li><li>Week 3+: Gradually increase handling time.</li></ul>
<p>Signs your dragon is comfortable: relaxed body, calm breathing, sitting still on your hand.<br>Signs of stress: dark beard, puffed up body, running away, glass surfing.</p>
<h3>6. Common Beginner Mistakes to Avoid</h3>
<ul><li>❌ Using a red or blue night heat bulb — bearded dragons can see these and it disrupts sleep</li><li>❌ Buying a coil/compact UVB bulb instead of a T5 tube — not strong enough</li><li>❌ Feeding only crickets — not nutritionally complete</li><li>❌ Not having a vet lined up — find a reptile vet before you need one</li><li>❌ Skipping calcium supplements — leads to MBD within months</li></ul>

<p>👉 [See our full recommended bearded dragon starter shopping list on Amazon →] (https://amzn.to/example7)</p>

  <p>One of the first questions new bearded dragon owners ask is: <strong>"How much does it cost to set up a bearded dragon enclosure?"</strong> The internet will scare you with numbers like $300–$500. But here's the truth — if you're smart about it, you can set up a fully functional, safe enclosure for a baby bearded dragon for <strong>under $100.</strong></p>
  
  <p>This guide breaks down exactly what to buy, where to save money, and — just as importantly — what you absolutely cannot cut corners on.</p>
  
  <div class="wlp-warn">
    <strong>⚠️ Important Before We Start</strong>
    This $100 budget works best for a <strong>baby bearded dragon (0–6 months)</strong> using a 40-gallon tank. Adult dragons need a 120-gallon enclosure which costs more. Plan to upgrade within 12 months.
  </div>

  <h2>1. The Tank — Your Biggest Decision</h2>
  <p>For a baby bearded dragon, a <strong>40-gallon tank</strong> is the minimum. Don't go smaller — bearded dragons grow fast and a cramped tank causes stress.</p>
  
  <h3>New vs. Used Tank</h3>
  <p>Buying used is perfectly fine as long as it has no cracks and no chemical residue. Rinse thoroughly with white vinegar and warm water, let it dry completely, and it's ready to go.</p>
  
  <table>
    <thead><tr><th>Option</th><th>Cost</th><th>Where to Find</th></tr></thead>

  <h2>2. UVB Lighting — Do NOT Cheap Out Here</h2>
  <p>This is the one area where you <strong>cannot cut corners.</strong> Without proper UVB lighting, your bearded dragon cannot absorb calcium, which leads to Metabolic Bone Disease (MBD) — a painful and often fatal condition.</p>
  <p>You need a <strong>T5 HO UVB bulb rated 10.0 or 12%</strong>. The most budget-friendly reliable option is the <strong>Reptisun 10.0 T5 HO</strong> at around $25–$30.</p>
  
  <div class="wlp-warn">
    <strong>⚠️ Avoid These Common Mistakes</strong>
    Do NOT buy coil/compact UVB bulbs — they are not strong enough for bearded dragons. Do NOT place UVB on top of a mesh lid — mesh blocks up to 50% of UVB rays. The bulb must be inside the enclosure.
  </div>
  
  <div class="wlp-cta">
    <span class="cta-title">💡 Best Budget UVB Bulbs for Bearded Dragons</span>
    <p>The Reptisun 10.0 T5 HO is our #1 pick for beginners on a budget.</p>
    <a href="YOUR_AFFILIATE_LINK_HERE" class="wlp-btn green">Shop UVB Bulbs →</a>
  </div>
  
  <h2>3. Basking Bulb — Hardware Store Hack</h2>
  <p>Here's a money-saving secret most pet stores don't tell you: <strong>a regular halogen flood bulb from a hardware store works perfectly as a basking bulb</strong> and costs only $5–$8 instead of $15–$25 for a "reptile" branded bulb.</p>
  <p>You need to create the right temperature gradient in your enclosure:</p>
  
  <table>
    <thead><tr><th>Zone</th><th>Temperature</th></tr></thead>
    <tbody>
      <tr><td>🔥 Basking Spot</td><td>100–110°F (38–43°C)</td></tr>
      <tr><td>❄️ Cool Side</td><td>80–85°F (27–29°C)</td></tr>
      <tr><td>🌙 Nighttime</td><td>No lower than 65°F (18°C)</td></tr>
    </tbody>
  </table>
  
  <h2>4. Substrate — Use Ceramic Tiles</h2>
  <p>For a baby bearded dragon, <strong>ceramic tiles from a hardware store</strong> are the absolute best budget substrate. They cost $5–$8, are easy to clean, hold heat well, and are completely safe — no risk of impaction like with sand or loose substrate.</p>
  
  <div class="wlp-tip">
    <strong>💡 Tile Tip</strong>
    Buy unglazed ceramic tiles in a dark brown or tan color. They look natural, help with nail filing, and you can pop them in the dishwasher to clean. Measure your tank before going to the store.
  </div>
  
  <h2>5. Thermometer — Get a Digital One</h2>
  <p>The little color-changing stick thermometers are inaccurate and dangerous. Spend $10–$14 on a <strong>digital dual-probe thermometer</strong> so you can monitor both the basking side and cool side at the same time.</p>

  <h2>6. What to Skip When on a Budget</h2>
  <p>These are commonly sold in "starter kits" but you don't actually need them right away:</p>
  <ul class="dont-list">
    <li>Expensive reptile décor and hides — use cardboard boxes or paper towel rolls temporarily</li>
    <li>Reptile-branded water dishes — any small ceramic bowl works fine</li>
    <li>Foggers or misters — bearded dragons come from dry desert climates and don't need humidity</li>
    <li>Night heat bulbs — if your room stays above 65°F, you don't need one</li>
    <li>Sand or loose substrate — actually dangerous for babies, not worth buying</li>

    // Helper functions
    function getFirstImageSrc(html) { let div=document.createElement('div'); div.innerHTML=html; let img=div.querySelector('img'); return img ? img.src : null; }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString(undefined, {year:'numeric',month:'long',day:'numeric'}); }
    
    // Get current post from URL
    function getPostBySlug(slug) {
        return postsData.find(post => {
            let postSlug = post.title.toLowerCase().replace(/[^\w\s]/g,'').replace(/\s+/g,'-');
            return postSlug === slug;
        });
    }
    
    // Find related posts: match keywords from title, exclude current, max 3
    function getRelatedPosts(currentPost, max=3) {
        if (!currentPost) return [];
        let keywords = currentPost.title.toLowerCase().split(/\W+/).filter(w => w.length > 3);
        if (keywords.length === 0) keywords = ['dragon','gecko','lizard'];
        
        let scored = postsData.filter(p => p.id !== currentPost.id).map(post => {
            let titleLow = post.title.toLowerCase();
            let score = keywords.filter(kw => titleLow.includes(kw)).length;
            return { post, score };
        });
        scored.sort((a,b) => b.score - a.score);
        let filtered = scored.filter(item => item.score > 0).slice(0, max);
        if (filtered.length < max) {
            let existingIds = filtered.map(f => f.post.id);
            let latest = [...postsData].sort((a,b) => new Date(b.date) - new Date(a.date))
                         .filter(p => p.id !== currentPost.id && !existingIds.includes(p.id))
                         .slice(0, max - filtered.length);
            latest.forEach(p => filtered.push({ post: p, score: 0 }));
        }
        return filtered.map(f => f.post);
    }
    
    // Render related posts
    function renderRelatedPosts(relatedPosts) {
        const container = document.getElementById('relatedPostsContainer');
        if (!relatedPosts.length) { container.innerHTML = ''; return; }
        let html = `<div class="related-section"><h3 class="related-title"><i class="fas fa-paw"></i> You May Also Like</h3><div class="related-grid">`;
        for (let post of relatedPosts) {
            let thumb = getFirstImageSrc(post.content) || 'https://placehold.co/400x200/0f3b2c/white?text=Wild+Pets';
            let slug = encodeURIComponent(post.title.toLowerCase().replace(/[^\w\s]/g,'').replace(/\s+/g,'-'));
            html += `
                <a href="post.html?post=${slug}" class="related-link">
                    <div class="related-card">
                        <img class="related-img" src="${thumb}" alt="${escapeHtml(post.title)}">
                        <div class="related-info">
                            <div class="related-card-title">${escapeHtml(post.title)}</div>
                            <div class="related-card-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</div>
                        </div>
                    </div>
                </a>
            `;
        }
        html += `</div></div>`;
        container.innerHTML = html;
    }
    
    // Main execution
    const urlParams = new URLSearchParams(window.location.search);
    const slugParam = urlParams.get('post');
    const post = getPostBySlug(slugParam);
    const postContainer = document.getElementById('postContent');
    const relatedContainer = document.getElementById('relatedPostsContainer');
    
    if (post) {
        postContainer.innerHTML = `
            <div class="post-header">
                <h1 class="post-title">${escapeHtml(post.title)}</h1>
                <div class="post-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</div>
            </div>
            <div class="post-content">${post.content}</div>
        `;
        document.title = `${post.title} | Wild Little Pets`;
        // Add Schema.org BlogPosting
        let schema = { "@context": "https://schema.org", "@type": "BlogPosting", "headline": post.title, "datePublished": post.date, "author": { "@type": "Organization", "name": "Wild Little Pets" } };
        let script = document.createElement('script'); script.type = 'application/ld+json'; script.textContent = JSON.stringify(schema); document.head.appendChild(script);
        
        const related = getRelatedPosts(post, 3);
        renderRelatedPosts(related);
    } else {
        postContainer.innerHTML = `<div style="text-align:center; padding:3rem;"><i class="fas fa-exclamation-triangle"></i> Article not found. <a href="index.html">Return to homepage</a></div>`;
        relatedContainer.innerHTML = '';
    }
</script>
