<!-- post.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Little Pets - Article</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing: border-box; }
        body { font-family: system-ui, 'Segoe UI', sans-serif; background: #fefcf5; color: #1e2a1a; }
        .header { background: #0f3b2c; padding: 1rem 2rem; color: white; display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; justify-content: space-between; }
        .logo-img { height: 48px; width: 48px; border-radius: 50%; object-fit: cover; border: 2px solid white; }
        .site-name { font-size: 1.4rem; font-weight: bold; }
        .back-home { color: white; text-decoration: none; background: #1a5a41; padding: 0.5rem 1rem; border-radius: 40px; }
        .container { max-width: 900px; margin: 2rem auto; padding: 0 1.5rem; background: white; border-radius: 32px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .post-header { padding: 2rem 2rem 0 2rem; }
        .post-title { font-size: 2rem; color: #0f3b2c; margin-bottom: 0.5rem; }
        .post-date { color: #6c7a5e; margin-bottom: 1rem; }
        .post-content { padding: 0 2rem 2rem 2rem; line-height: 1.7; }
        .post-content img { max-width: 100%; border-radius: 24px; margin: 1rem 0; }
        .post-content p { margin-bottom: 1rem; }
        .footer { background: #0f3b2c; color: #ddd; text-align: center; padding: 1.5rem; margin-top: 2rem; }
        @media (max-width: 640px) { .post-title { font-size: 1.6rem; } .container { margin: 1rem; } }
    </style>
</head>
<body>
<header class="header">
    <div style="display: flex; align-items: center; gap: 12px;">
        <img src="logo.png" class="logo-img" onerror="this.src='https://placehold.co/100x100/0f3b2c/white?text=WLP';">
        <span class="site-name">Wild Little Pets</span>
    </div>
    <a href="index.html" class="back-home"><i class="fas fa-home"></i> Back to Home</a>
</header>
<main class="container">
    <div id="postContent"></div>
</main>
<footer class="footer">
    <p>© 2025 Wild Little Pets — Expert exotic pet guides</p>
</footer>
<script>
    // Same postsData must be kept in sync with index.html
    const postsData = [
        // Copy exactly the same postsData array from index.html here
        // For simplicity, you can also fetch from a separate .js file, but manual sync is fine.
        // Example structure (replace with your actual posts)
    ];
    function getPostBySlug(slug) {
        return postsData.find(post => {
            let postSlug = post.title.toLowerCase().replace(/[^\w\s]/g,'').replace(/\s+/g,'-');
            return postSlug === slug;
        });
    }
    const urlParams = new URLSearchParams(window.location.search);
    const slugParam = urlParams.get('post');
    const post = getPostBySlug(slugParam);
    const container = document.getElementById('postContent');
    if(post) {
        container.innerHTML = `
            <div class="post-header">
                <h1 class="post-title">${escapeHtml(post.title)}</h1>
                <div class="post-date"><i class="far fa-calendar-alt"></i> ${new Date(post.date).toLocaleDateString()}</div>
            </div>
            <div class="post-content">${post.content}</div>
        `;
        document.title = `${post.title} | Wild Little Pets`;
        // Add schema BlogPosting
        let schema = {
            "@context": "https://schema.org",
            "@type": "BlogPosting",
            "headline": post.title,
            "datePublished": post.date,
            "author": { "@type": "Organization", "name": "Wild Little Pets" }
        };
        let script = document.createElement('script');
        script.type = 'application/ld+json';
        script.textContent = JSON.stringify(schema);
        document.head.appendChild(script);
    } else {
        container.innerHTML = `<div style="text-align:center; padding:3rem;"><i class="fas fa-exclamation-triangle"></i> Article not found. <a href="index.html">Return to homepage</a></div>`;
    }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
</script>
</body>
</html>
