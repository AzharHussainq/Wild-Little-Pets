  <p>Setting up a bearded dragon cage for the first time can feel overwhelming. There are so many products, so many opinions online, and so many things that can go wrong if you get it wrong from the start.</p>
  
  <p>The good news? Once you understand the basics of what a bearded dragon actually needs, the whole process becomes simple and straightforward. This guide walks you through every single step of the perfect bearded dragon cage setup — from choosing the right tank size to arranging the habitat exactly the way your dragon needs it.</p>
  
  <h2>Best Bearded Dragon Tank Size</h2>
  <p>The very first decision you need to make is tank size. This is where most beginners make their biggest mistake — buying a tank that is too small.</p>
  
  <p>Bearded dragons grow fast. A baby that fits in your hand today will be a 16–24 inch adult within 12–18 months. Buying a small tank to save money now usually means spending more money on an upgrade tank within a year.</p>
  
  <p>Here is the recommended tank size by age:</p>
  
  <table>
    <thead><tr><th>Age</th><th>Minimum Tank Size</th><th>Recommended</th></tr></thead>
    <tbody>
      <tr><td>Baby (0–3 months)</td><td>20 gallon</td><td>40 gallon</td></tr>
      <tr><td>Juvenile (3–12 months)</td><td>40 gallon</td><td>75 gallon</td></tr>
      <tr><td>Adult (12+ months)</td><td>75 gallon</td><td>120 gallon</td></tr>
    </tbody>
  </table>
  
  <p>The smartest move for most beginners is to skip straight to a 75 or 120 gallon tank from the beginning. Yes, it costs more upfront — but you will never need to buy another tank again.</p>
  
  <h3>Glass vs. PVC vs. Wood Vivarium</h3>
  <p>There are three main types of bearded dragon vivarium options available:</p>
  
  <p><strong>Glass tanks</strong> are the most popular choice for beginners. They are easy to find, affordable, and easy to clean. The downside is that they do not retain heat as well as other options, so you may need a stronger basking bulb in colder rooms.</p>
  
  <p><strong>PVC enclosures</strong> retain heat much better than glass and are lighter in weight. They are more expensive but worth the investment if you live in a cooler climate.</p>
  
  <p><strong>Wood vivariums</strong> are great for heat retention and look beautiful, but they can warp over time if humidity gets inside. Not the best choice for beginners.</p>
  
  <p>For most beginners, a <strong>glass tank with a screen top</strong> is the ideal starting point. It is affordable, widely available, and works perfectly with the right lighting setup.</p>
  
  <h2>Bearded Dragon Habitat Setup — The 5 Essentials</h2>
  <p>Once you have your tank, the habitat setup comes down to five things. Get all five right and your bearded dragon will thrive.</p>
  
  <h3>1. Temperature Zones</h3>
  <p>Bearded dragons come from the hot, dry deserts of Australia. They are cold-blooded, which means they cannot regulate their own body temperature — they rely entirely on their environment to do it for them.</p>
  
  <p>This is why your cage setup must have two distinct temperature zones:</p>
  
  <table>
    <thead><tr><th>Zone</th><th>Required Temperature</th></tr></thead>
    <tbody>
      <tr><td>🔥 Basking spot</td><td>100–110°F (38–43°C)</td></tr>
      <tr><td>❄️ Cool side</td><td>80–85°F (27–29°C)</td></tr>
      <tr><td>🌙 Nighttime (whole tank)</td><td>No lower than 65°F (18°C)</td></tr>
    </tbody>
  </table>
  
  <p>You create the basking spot by placing a basking bulb at one end of the tank — this becomes the hot side. The opposite end naturally stays cooler — this becomes the cool side. Your dragon will move between the two zones throughout the day to regulate their temperature, just like they would in the wild.</p>
  
  <p>Always use a <strong>digital dual-probe thermometer</strong> to monitor both sides accurately. The cheap color-changing stick thermometers that come in starter kits are notoriously inaccurate and can give readings that are off by 10–15 degrees.</p>
  
  <h3>2. UVB Lighting</h3>
  <p>UVB lighting is the single most important thing in your bearded dragon cage setup. Without it, your dragon cannot absorb calcium from their food — which leads directly to Metabolic Bone Disease (MBD), a painful and often fatal condition.</p>
  
  <p>You need a <strong>T5 HO UVB tube bulb rated at 10.0 or 12%</strong>. The two most trusted brands are:</p>
  
  <ul><li><strong>Arcadia Dragon Lamp 12%</strong> — widely considered the gold standard for bearded dragons</li><li><strong>Zoo Med Reptisun 10.0 T5 HO</strong> — reliable, widely available, and budget friendly</li></ul>
  
  <p>The UVB bulb should run along the length of the basking side, positioned <strong>inside the tank</strong> — never on top of a mesh lid. Mesh screen blocks up to 50% of UVB rays before they even reach your dragon.</p>
  
  <div class="wlp-warn">
    <strong>⚠️ Critical Point</strong>
    UVB bulbs lose their effectiveness long before they stop producing visible light. Replace your UVB bulb every <strong>6 months</strong>, even if it still appears to be working fine.
  </div>
  
  <h3>3. Substrate</h3>
  <p>Substrate is what you put on the floor of the enclosure. For baby and juvenile bearded dragons, the choice of substrate is especially important because babies will accidentally eat loose particles, which can cause a life-threatening condition called impaction.</p>
  
  <p>The safest and most practical options by age:</p>
  
  <table>
    <thead><tr><th>Age</th><th>Best Substrate Options</th></tr></thead>
    <tbody>
      <tr><td>Baby (0–6 months)</td><td>Reptile carpet, ceramic tiles, paper towels</td></tr>
      <tr><td>Juvenile (6–12 months)</td><td>Reptile carpet, ceramic tiles</td></tr>
      <tr><td>Adult (12+ months)</td><td>Ceramic tiles, slate tiles, or bioactive soil mix</td></tr>
    </tbody>
  </table>
  
  <p><strong>Ceramic tiles</strong> are arguably the best all-around option for any age. They are cheap, easy to clean, hold heat well, help naturally file your dragon's nails, and carry zero risk of impaction. Pick them up at any hardware store — measure your tank first and have them cut to size.</p>
  
  <div class="wlp-warn">
    <strong>⚠️ Never use sand, wood chips, or walnut shell substrate</strong> for babies or juveniles. These are the most common causes of impaction in young bearded dragons.
  </div>
  
  <h3>4. Hides and Décor</h3>
  <p>A proper bearded dragon habitat setup includes at least one hide on the cool side of the enclosure where your dragon can retreat and feel secure. Without a hide, many dragons become chronically stressed, which directly impacts their appetite and immune system.</p>
  
  <p>Beyond the hide, you can add:</p>
  <ul><li><strong>Basking platforms or rocks</strong> — raises your dragon closer to the basking bulb for more effective heat absorption</li><li><strong>Climbing branches</strong> — bearded dragons are semi-arboreal in the wild and enjoy elevated spots</li><li><strong>Flat rocks or slate</strong> — creates natural-looking surfaces and retains heat beautifully</li><li><strong>Fake or real plants</strong> — adds visual interest and makes the habitat feel more natural</li></ul>
  
  <p>Keep décor simple in the beginning. One hide, one basking platform, and one branch is a perfect starting point. You can always add more over time.</p>
  
  <h3>5. Food and Water Dishes</h3>
  <p>Every bearded dragon cage setup needs two shallow dishes — one for fresh vegetables and greens, placed on the cool side, and one shallow water dish. Keep the water dish small and shallow to prevent accidental drowning for babies, and change the water daily.</p>
  
  <h2>120 Gallon Bearded Dragon Tank Setup</h2>
  <p>If you are setting up for an adult bearded dragon, the 120 gallon tank is the gold standard. It gives your dragon enough space to establish proper temperature zones, exercise, and express natural behaviors.</p>
  
  <p>Here is exactly how to arrange a 120 gallon bearded dragon tank setup:</p>
  
  <p><strong>Hot side (left or right end):</strong></p>
  <ul><li>Basking bulb positioned to create a 105°F basking spot</li><li>Basking platform or rock directly under the bulb</li><li>UVB tube running along this side of the tank</li></ul>
  
  <p><strong>Cool side (opposite end):</strong></p>
  <ul><li>Hide or shelter for security</li><li>Fresh greens dish</li><li>Shallow water dish</li><li>Any climbing branches or décor</li></ul>
  
  <p><strong>Middle zone:</strong></p>
  <ul><li>Open space for movement and exercise</li><li>Floor covered with ceramic or slate tiles</li><li>Optional: flat rocks for additional heat retention</li></ul>
  
  <p>This layout mimics how a bearded dragon would naturally use space in the wild — moving from the hot basking area to the cooler shaded area throughout the day.</p>

  <h2>Common Bearded Dragon Cage Setup Mistakes</h2>
  <p>Even with the best intentions, many beginners make the same mistakes. Here are the most common ones to avoid:</p>
  
  <ul class="dont-list">
    <li><strong>Using a tank that is too small.</strong> A 10 or 20 gallon tank is not appropriate for a bearded dragon at any age beyond the first few weeks. Small tanks cause chronic stress and prevent proper temperature gradients.</li>
    <li><strong>Placing UVB on top of a mesh lid.</strong> As mentioned, mesh blocks up to half the UVB rays. The bulb must be inside the tank for proper exposure.</li>
    <li><strong>Using a coil or compact UVB bulb.</strong> These bulbs are simply not strong enough for bearded dragons and have been linked to eye problems and MBD. Always use a T5 HO tube bulb.</li>
    <li><strong>Using sand as substrate for babies.</strong> This is one of the most common causes of impaction in young bearded dragons. Stick to tiles or reptile carpet until your dragon is fully grown.</li>
    <li><strong>Not monitoring temperatures accurately.</strong> Always use a digital thermometer. Never guess or rely on cheap analog gauges.</li>
    <li><strong>No hide on the cool side.</strong> A dragon with nowhere to retreat will be permanently stressed. Always provide at least one hide.</li>
  </ul>

    function getRelatedPosts(currentPost, max=3) {
