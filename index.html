        .post-card { background: var(--white); border-radius: 24px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.05); transition: transform 0.25s, box-shadow 0.25s; border: 1px solid rgba(15,59,44,0.1); display: flex; flex-direction: column; }

        .no-posts-msg { text-align: center; grid-column: 1/-1; padding: 3rem; font-size: 1.2rem; color: #5a6e52; }

<body>
<header class="header">
    <div class="nav-container">
        <div class="logo-area">
            <img src="logo.png" alt="Wild Little Pets Logo" class="logo-img" onerror="this.src='https://placehold.co/200x200/0f3b2c/white?text=WLP';">

</header>
<section class="hero">

    </div>
</section>
<main class="container">
    <div class="posts-grid" id="postsGrid"></div>
    <div class="load-more-container" id="loadMoreWrapper" style="display: none;"><button class="load-more-btn" id="loadMoreBtn"><span>Load More Articles</span> <i class="fas fa-arrow-down"></i></button></div>
</main>
<footer class="footer">
    <div class="social-icons">
        <a href="https://www.pinterest.com/WildLittlePets/" target="_blank"><i class="fab fa-pinterest"></i></a>
        <a href="https://wa.me/923558137077" target="_blank"><i class="fab fa-whatsapp"></i></a>
    </div>
    <div class="footer-text">© 2025 Wild Little Pets — problem-solving for wild pets | Ethical care guides</div>
</footer>
<script>
    // ========== EDIT YOUR BLOG POSTS HERE ==========
    const postsData = [
        // Example post (delete or replace with your own)
        // {
        //     id: 1,
        //     title: "Why Is My Leopard Gecko Glass Surfing?",
        //     date: "2025-02-10",
        //     content: `<img src="https://placehold.co/600x400/2c5e3a/white?text=Leopard+Gecko"><p>Glass surfing is common stress behavior. Learn how to adjust habitat...</p>`
        // }
    ];
    // ================================================
    
    const sortedPosts = [...postsData].sort((a,b) => new Date(b.date) - new Date(a.date));
    function getFirstImageSrc(html) { let div=document.createElement('div'); div.innerHTML=html; let img=div.querySelector('img'); return img ? img.src : null; }
    function generateExcerpt(html, max=110) { let div=document.createElement('div'); div.innerHTML=html; let txt=div.textContent||div.innerText||''; return txt.length>max?txt.slice(0,max).trim()+'…':txt.trim(); }
    function formatDate(dateStr) { return new Date(dateStr).toLocaleDateString(undefined, {year:'numeric',month:'long',day:'numeric'}); }
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    
    let currentCount = 0;
    const postsPerLoad = 12;
    const postsGrid = document.getElementById('postsGrid');
    const loadWrapper = document.getElementById('loadMoreWrapper');
    const loadBtn = document.getElementById('loadMoreBtn');
    
    function renderPosts(start, count, append=false) {
        let end = Math.min(start+count, sortedPosts.length);
        let toRender = sortedPosts.slice(start, end);
        if(!append) postsGrid.innerHTML = '';
        if(sortedPosts.length === 0 && !append) {
            postsGrid.innerHTML = '<div class="no-posts-msg"><i class="fas fa-feather-alt"></i> No posts yet. Add your first blog post in the postsData array.</div>';
            loadWrapper.style.display = 'none';
            return;
        }
        toRender.forEach(post => {
            let thumb = getFirstImageSrc(post.content) || 'https://placehold.co/600x400/0f3b2c/white?text=Wild+Pets';
            let excerpt = generateExcerpt(post.content);
            let slug = encodeURIComponent(post.title.toLowerCase().replace(/[^\w\s]/g,'').replace(/\s+/g,'-'));
            let card = document.createElement('article');
            card.className = 'post-card';
            card.innerHTML = `
                <img class="card-img" src="${thumb}" alt="${escapeHtml(post.title)}" loading="lazy">
                <div class="card-content">
                    <h2 class="post-title">${escapeHtml(post.title)}</h2>
                    <div class="post-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</div>
                    <p class="post-excerpt">${escapeHtml(excerpt)}</p>
                    <a href="post.html?post=${slug}" class="read-more-link">Read Guide <i class="fas fa-arrow-right"></i></a>
                </div>
            `;
            postsGrid.appendChild(card);
        });
        if(end < sortedPosts.length) loadWrapper.style.display = 'block';
        else loadWrapper.style.display = 'none';
        currentCount = end;
    }
    function loadMore() { let remaining = sortedPosts.length - currentCount; let toLoad = Math.min(postsPerLoad, remaining); if(toLoad>0) renderPosts(currentCount, toLoad, true); }
    if(loadBtn) loadBtn.addEventListener('click', loadMore);
    renderPosts(0, postsPerLoad, false);
    document.getElementById('mobileMenuBtn')?.addEventListener('click',()=>{ document.getElementById('navLinks').classList.toggle('show'); });
</script>
</body>
</html>
