                      <p>Patchy quills? Differentiate between mites, dry skin and hormonal causes. Vet-recommended treatments and bathing tips.</p>`
        }
    ];

    // Sort posts by date (newest first)
    const sortedPosts = [...postsData].sort((a,b) => new Date(b.date) - new Date(a.date));
    
    // Helper: extract first image src from HTML content
    function getFirstImageSrc(htmlContent) {
        const div = document.createElement('div');
        div.innerHTML = htmlContent;
        const img = div.querySelector('img');
        return img ? img.src : null;
    }
    
    // Helper: generate plain text excerpt from HTML (max length)
    function generateExcerpt(htmlContent, maxLen = 110) {
        const div = document.createElement('div');
        div.innerHTML = htmlContent;
        const text = div.textContent || div.innerText || '';
        return text.length > maxLen ? text.slice(0, maxLen).trim() + '…' : text.trim();
    }
    
    // Format date to readable
    function formatDate(dateStr) {
        const options = { year: 'numeric', month: 'long', day: 'numeric' };
        return new Date(dateStr).toLocaleDateString(undefined, options);
    }
    
    // Render posts cards on any container, optionally append
    let currentDisplayCount = 0;
    const postsPerLoad = 12;
    let isLoadingMore = false;
    
    const postsGrid = document.getElementById('postsGrid');
    const loadMoreWrapper = document.getElementById('loadMoreWrapper');
    const loadMoreBtn = document.getElementById('loadMoreBtn');
    
    function renderPosts(startIndex, count, append = false) {
        const endIndex = Math.min(startIndex + count, sortedPosts.length);
        const postsToRender = sortedPosts.slice(startIndex, endIndex);
        
        if (!append) {
            postsGrid.innerHTML = '';
        }
        
        postsToRender.forEach(post => {
            const thumbnailSrc = getFirstImageSrc(post.content) || 'https://placehold.co/600x400/0f3b2c/white?text=Wild+Pets';
            const excerpt = generateExcerpt(post.content, 120);
            const postCard = document.createElement('article');
            postCard.className = 'post-card';
            // Create slug from title for URL
            const slug = encodeURIComponent(post.title.replace(/\s+/g, '-').toLowerCase());
            postCard.innerHTML = `
                <img class="card-img" src="${thumbnailSrc}" alt="${post.title}" loading="lazy">
                <div class="card-content">
                    <h2 class="post-title">${escapeHtml(post.title)}</h2>
                    <div class="post-date"><i class="far fa-calendar-alt"></i> ${formatDate(post.date)}</div>
                    <p class="post-excerpt">${escapeHtml(excerpt)}</p>
                    <a href="post.html?post=${slug}" class="read-more-link">Read Guide <i class="fas fa-arrow-right"></i></a>
                </div>
            `;
            postsGrid.appendChild(postCard);
        });
        
        // Show/Hide load more wrapper if needed
        if (endIndex < sortedPosts.length) {
            loadMoreWrapper.style.display = 'block';
        } else {
            loadMoreWrapper.style.display = 'none';
        }
        currentDisplayCount = endIndex;
    }
    
    function loadMorePosts() {
        if (isLoadingMore) return;
        isLoadingMore = true;
        // Simulate smooth loading effect
        loadMoreBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Loading...';
        setTimeout(() => {
            const remaining = sortedPosts.length - currentDisplayCount;
            const toLoad = Math.min(postsPerLoad, remaining);
            if (toLoad > 0) {
                renderPosts(currentDisplayCount, toLoad, true);
            }
            loadMoreBtn.innerHTML = '<span>Load More Articles</span> <i class="fas fa-arrow-down"></i>';
            isLoadingMore = false;
        }, 300);
    }
    
    // Helper to escape HTML
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // Initial load: first 12 posts
    renderPosts(0, postsPerLoad, false);
    
    // Load more button event
    if (loadMoreBtn) {
        loadMoreBtn.addEventListener('click', loadMorePosts);
    }
    
    // Mobile menu toggle
    const menuBtn = document.getElementById('mobileMenuBtn');
    const navLinksDiv = document.getElementById('navLinks');
    if (menuBtn) {
        menuBtn.addEventListener('click', () => {

            "target": "https://wildlittlepets.github.io/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    };
    const scriptSchema = document.createElement('script');
    scriptSchema.type = 'application/ld+json';
    scriptSchema.textContent = JSON.stringify(websiteSchema);
    document.head.appendChild(scriptSchema);
</script>
